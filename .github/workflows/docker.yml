name: docker

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build image
        run: docker build --pull --build-arg VERSION=ci-test -t blucli:ci .

      - name: Smoke test image
        run: |
          set -euo pipefail
          test "$(docker run --rm blucli:ci --version)" = "ci-test"
          docker run --rm blucli:ci --help
