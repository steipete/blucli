name: docker

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build --pull -t blucli:ci .

      - name: Smoke test image
        run: |
          set -euo pipefail
          docker run --rm blucli:ci --version
          docker run --rm blucli:ci --help
